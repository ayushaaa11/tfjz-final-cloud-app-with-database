{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Course Card -->
    <div class="card shadow-lg">
        <div class="card-body">

            <!-- Course Name -->
            <h2 class="card-title text-center text-primary">
                {{ course.name }}
            </h2>

            <hr>

            <!-- Course Description -->
            <p class="text-center">
                {{ course.description }}
            </p>

        </div>
    </div>

    <!-- Lesson List -->
    <div class="mt-4">

        <h4 class="mb-3">Lessons</h4>

        <ul class="list-group">

            {% for lesson in course.lesson_set.all %}
                <li class="list-group-item">
                    <h5>{{ lesson.title }}</h5>
                    <p>{{ lesson.content }}</p>
                </li>
            {% empty %}
                <li class="list-group-item text-danger">
                    No lessons available for this course.
                </li>
            {% endfor %}

        </ul>

    </div>

</div>

</body>
</html>
